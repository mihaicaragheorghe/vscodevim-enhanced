name: Publish Prerelease

on:
  push:
    branches:
      - prerelease

jobs:
  publish-prerelease:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 24

    - name: Install vsce Extension Manager
      run: npm install -g @vscode/vsce

    - name: Install dependencies
      run: npm ci

    - name: Publish to VS Code Marketplace
      run: vsce publish --pre-release --pat ${{ secrets.VSCE_TOKEN }}
      continue-on-error: true
      env:
        NODE_ENV: production

    - name: Publish to Open VSX Registry (prerelease)
      run: npx ovsx publish --pre-release --pat ${{ secrets.OPEN_VSX_TOKEN }}
      continue-on-error: true
      env:
        NODE_ENV: production
